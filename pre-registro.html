.cb{padding:18px 16px}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
input[type=text],select,input[type=number]{width:100%;padding:13px 14px;border:1.5px solid var(--b);border-radius:10px;font-size:16px}
.btn-p{width:100%;padding:16px;border-radius:12px;font-size:17px;font-weight:700;background:var(--t);color:#fff;border:none;cursor:pointer}
.err-box{background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:10px;padding:12px 16px;margin-bottom:16px;color:#7F1D1D;display:none}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;align-items:flex-start;justify-content:center;padding:16px}
.ov.show{display:flex}
.md{background:#fff;border-radius:16px;padding:24px 20px;max-width:520px;width:100%}
