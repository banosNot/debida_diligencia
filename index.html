#app{max-width:980px;margin:0 auto;padding:16px 12px}
#nav{background:var(--n);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;gap:4px;flex-wrap:wrap}
.pst{padding:3px 10px;border-radius:10px;font-size:9px;font-weight:700;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);cursor:pointer;transition:all .2s;white-space:nowrap}

.sc{background:#fff;border-radius:10px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.sh{display:flex;align-items:center;gap:10px;padding:10px 16px;color:#fff;cursor:pointer;user-select:none}

.sh h2{font-size:11px;font-weight:700;flex:1}
.sv{transition:transform .25s}
.sb{padding:14px 16px;display:none;border-top:2px solid #E2E8F0}
.sc.open .sb{display:block}
.sc.open .sv{transform:rotate(180deg)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.full{grid-column:1/-1}

.fld{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.fld label{font-size:10px;font-weight:700;color:#374151}
.req{color:#B71C1C;margin-left:2px}
.cc{font-size:9px;color:#9CA3AF;text-align:right;margin-top:1px}

input:focus,select:focus,textarea:focus{outline:none;border-color:var(--t);box-shadow:0 0 0 3px rgba(13,115,119,.12)}

.rr{display:flex;gap:12px;flex-wrap:wrap;padding:4px 0}
.ri{display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer}
.ri input{accent-color:var(--t);width:13px;height:13px}
.rprow{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
.rp{padding:5px 14px;border-radius:20px;border:2px solid;cursor:pointer;font-size:10px;font-weight:700;transition:all .2s;user-select:none}

.rp[data-v="MEDIO"]{color:#B45309;border-color:#B45309}.rp.on[data-v="MEDIO"]{background:#FEF3C7}
.rp[data-v="ALTO"]{color:#E65100;border-color:#E65100}.rp.on[data-v="ALTO"]{background:#FFEDD5}
.rp[data-v="MUY ALTO"]{color:#B71C1C;border-color:#B71C1C}.rp.on[data-v="MUY ALTO"]{background:#FEE2E2}
.br{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;align-items:center}
.btn{padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.bp{background:var(--t);color:#fff}.bp:hover{background:#0a5e63}.bp:disabled{background:#9CA3AF;cursor:not-allowed}
.bs{background:var(--n);color:#fff}.bs:hover{background:#132d54}

.fpc{background:#fff;border:2px solid #E2E8F0;border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;cursor:pointer}
.fpc.on{border-color:var(--t);box-shadow:0 2px 8px rgba(13,115,119,.15)}
.fph{display:flex;align-items:center;gap:10px;padding:10px 14px;min-height:46px;user-select:none}
.fpc.on .fph{background:#CCFBF1}
.fpic{font-size:17px;width:26px;text-align:center;flex-shrink:0}
.fpnm{flex:1;font-size:12px;font-weight:600;color:#374151}

.fpb{display:none;padding:0 14px 12px;border-top:1px solid #E2E8F0}

.fpmw input:focus{outline:none;border-color:var(--t);box-shadow:0 0 0 3px rgba(13,115,119,.15)}

.fbr{display:flex;justify-content:space-between;font-size:11px;color:#555;padding:3px 0}

#fpest.under{background:#FEF3C7;color:#92400E;border:1.5px solid #FCD34D;display:block}
#fpest.noref{background:#EDE9FE;color:#5B21B6;border:1.5px solid #C4B5FD;display:block}

.cl{font-size:10px;font-weight:700;color:#374151;display:block;margin-bottom:3px;margin-top:8px}

.hi:hover{border-color:var(--t);background:#F0FDFA}
.hied{background:#FFFBEB;border-color:#F59E0B}
.int-it{padding:8px 10px;border-radius:7px;background:#fff;border:1px solid #E2E8F0;margin-bottom:5px;cursor:pointer;font-size:11px;transition:all .2s}
