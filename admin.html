<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel Administrativo v2.1 &mdash; Debida Diligencia</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--n:#1B3A6B;--t:#0D7377;--r:#B71C1C;--g:#065F46;--b:#E2E8F0;--bg:#F0F4F8}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:#1a1a2e;font-size:13px;min-height:100vh}
#tb{background:linear-gradient(135deg,#1B3A6B,#0D7377);padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tb-l{display:flex;align-items:center;gap:12px}
.tb-logo{height:34px}
.tb-txt .t1{font-size:13px;font-weight:800;color:#fff;display:block}
.tb-txt .t2{font-size:10px;color:rgba(255,255,255,.6);display:block}
.tb-r{display:flex;gap:8px;align-items:center}
#sp{font-size:10px;padding:5px 12px;border-radius:12px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-weight:700}
#sp.ok{background:#065F46;color:#fff;border-color:#6EE7B7}
#sp.err{background:#7F1D1D;color:#fff;border-color:#FCA5A5}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 62px);padding:20px}
#app{display:none;max-width:1200px;margin:0 auto;padding:20px 16px 40px}
.login-card{background:#fff;border-radius:16px;padding:40px 36px;max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center}
.login-card .ico{font-size:48px;margin-bottom:16px}
.login-card h2{font-size:20px;font-weight:800;color:var(--n);margin-bottom:6px}
.login-card p{font-size:12px;color:#6B7280;margin-bottom:24px;line-height:1.6}
.inp{width:100%;padding:12px 16px;border:1.5px solid var(--b);border-radius:10px;font-size:14px;font-family:inherit;transition:border-color .2s}
.inp:focus{outline:none;border-color:var(--t);box-shadow:0 0 0 3px rgba(13,115,119,.12)}
.btn-p{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;background:var(--t);color:#fff;border:none;cursor:pointer;font-family:inherit;margin-top:12px;transition:background .2s}
.err-login{background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;padding:8px 14px;font-size:12px;color:#7F1D1D;display:none;margin-top:10px}
.tabs{display:flex;gap:4px;background:#fff;border-radius:12px;padding:6px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);flex-wrap:wrap}
.tab{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:#6B7280;transition:all .2s;border:none;background:none;font-family:inherit}
.tab.act{background:var(--n);color:#fff;box-shadow:0 2px 8px rgba(27,58,107,.25)}
.panel{display:none}
.panel.show{display:block}
.filters{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.flt{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;max-width:220px}
.flt label{font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px}
.flt input,.flt select{padding:8px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:12px;font-family:inherit;background:#fff}
.btn-f{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;height:38px;margin-top:auto}
.btn-f.p{background:var(--t);color:#fff}
.btn-f.s{background:#fff;color:var(--n);border:2px solid var(--n)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--t)}
.kpi.red{border-color:#B71C1C}.kpi.green{border-color:#2E7D32}.kpi.amber{border-color:#B45309}.kpi.purple{border-color:#6A1B9A}
.kpi-val{font-size:28px;font-weight:900;color:var(--n);font-family:monospace;line-height:1}
.tbl-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:11px}
table th{background:#F8FAFC;padding:10px 12px;text-align:left;font-weight:700;color:#6B7280;border-bottom:1px solid var(--b)}
table td{padding:9px 12px;border-bottom:1px solid #F8FAFC;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700}
.badge.g{background:#D1FAE5;color:#065F46}.badge.r{background:#FEE2E2;color:#7F1D1D}
.badge.b{background:#DBEAFE;color:#1E40AF}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px}
.ov.show{display:flex}
.md{background:#fff;border-radius:14px;padding:28px;max-width:600px;width:100%;margin:auto;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.spin-ov{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:800;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spin-ov.show{display:flex}
.spin{width:44px;height:44px;border:4px solid #E2E8F0;border-top-color:var(--t);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.det-fld{background:#F8FAFC;border-radius:8px;padding:10px 14px}
.det-lbl{font-size:10px;font-weight:700;color:#6B7280;margin-bottom:3px}
.det-val{font-size:12px;color:#1a1a2e;font-weight:600;word-break:break-word}
.det-val.editable{cursor:pointer;padding:3px 6px;border-radius:5px}
.det-val.editable:hover{background:#CCFBF1;color:#065F46}
</style>
</head>
